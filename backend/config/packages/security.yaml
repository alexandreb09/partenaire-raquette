security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        admin:
            pattern: ^/admin
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: /admin/login
                check_path: /admin/login
                default_target_path: /admin
            logout:
                path: /admin/logout
                target: /admin/login
        api:
            pattern: ^/api
            stateless: true
            jwt: ~

    access_control:
        - { path: ^/admin/login, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/forgot-password, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/reset-password, roles: PUBLIC_ACCESS }
        - { path: ^/api/users/cities, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/users$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: "^/api/users/\\d+$", roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/proposals/cities, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/proposals$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/proposals/\d+$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/reports, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
